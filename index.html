<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Cold Call — fix the burger chain's eternally broken ice cream machines.">
  <meta name="theme-color" content="#7fd4f0">
  <title>Cold Call</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <main id="app">
    <noscript>Cold Call needs JavaScript to run.</noscript>
  </main>
  <script type="module" src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      const localDevelopment =
        location.hostname === 'localhost' ||
        location.hostname === '127.0.0.1' ||
        location.hostname === '[::1]';

      if (localDevelopment) {
        // Never let the offline production shell hide local CSS/JS edits.
        navigator.serviceWorker.getRegistrations().then((registrations) =>
          Promise.all(registrations.map((registration) => registration.unregister()))
        );
        if ('caches' in window) {
          caches.keys().then((keys) =>
            Promise.all(keys.filter((key) => key.startsWith('coldcall-')).map((key) => caches.delete(key)))
          );
        }
      } else {
        navigator.serviceWorker.register('sw.js');
      }
    }
  </script>
</body>
</html>
