<!doctype html>
<html lang="en">
<head>
  <base href="../">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cold Call — Job UI Preview</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <main id="app"></main>
  <script>
    addEventListener('error', (event) => {
      document.querySelector('#app').textContent = `Preview error: ${event.message}`;
    });
    addEventListener('unhandledrejection', (event) => {
      document.querySelector('#app').textContent = `Preview error: ${event.reason?.message ?? event.reason}`;
    });
  </script>
  <script type="module">
    globalThis.test = false;
    const [{ defaultState }, { startJob }, { jobView }, fault, machineData, clientData] = await Promise.all([
      import('../js/state.js'),
      import('../js/diagnosis.js'),
      import('../js/ui/job.js'),
      fetch('../data/faults/mix-feed-valve-stuck-closed.json').then((r) => r.json()),
      fetch('../data/machines.json').then((r) => r.json()),
      fetch('../data/clients.json').then((r) => r.json()),
    ]);

    const state = defaultState();
    state.player.cash = 4526;
    state.player.reputation = 36;
    state.player.tierUnlocked = 2;
    state.van.stock['generic-parts'] = 2;
    state.stats.jobsCompleted = 8;
    startJob(state, fault, 'burgertown-high-st', () => 0.31);

    if (new URLSearchParams(location.search).has('tested')) {
      state.jobs.active.testsRun.push('temp-probe');
      state.jobs.active.minutesSpent = 5;
    }

    const machines = machineData.machines ?? machineData;
    const clients = clientData.clients ?? clientData;
    document.querySelector('#app').innerHTML = jobView({
      state,
      faults: { [fault.id]: fault },
      machines,
      clients,
    });
    document.body.dataset.viewportWidth = innerWidth;
  </script>
</body>
</html>
