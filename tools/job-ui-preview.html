<!doctype html>
<html lang="en">
<head>
  <base href="../">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cold Call — Job UI Preview</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <main id="app"></main>
  <script>
    addEventListener('error', (event) => {
      document.querySelector('#app').textContent = `Preview error: ${event.message}`;
    });
    addEventListener('unhandledrejection', (event) => {
      document.querySelector('#app').textContent = `Preview error: ${event.reason?.message ?? event.reason}`;
    });
  </script>
  <script type="module">
    globalThis.test = false;
    const params = new URLSearchParams(location.search);
    const requestedFault = params.get('fault') ?? 'mix-feed-valve-stuck-closed';
    const faultFile = /^[a-z0-9-]+$/.test(requestedFault) ? requestedFault : 'mix-feed-valve-stuck-closed';
    const [{ defaultState }, { startJob }, { jobView }, { wireTermHelp }, fault, machineData, clientData] = await Promise.all([
      import('../js/state.js'),
      import('../js/diagnosis.js'),
      import('../js/ui/job.js'),
      import('../js/terminology.js'),
      fetch(`../data/faults/${faultFile}.json`).then((r) => r.json()),
      fetch('../data/machines.json').then((r) => r.json()),
      fetch('../data/clients.json').then((r) => r.json()),
    ]);

    const state = defaultState();
    state.player.cash = 4526;
    state.player.reputation = 36;
    state.player.tierUnlocked = 2;
    state.van.stock['generic-parts'] = 2;
    state.stats.jobsCompleted = params.has('first') ? 0 : 8;
    const guidanceMode = params.get('guidance');
    if (['auto', 'on', 'off'].includes(guidanceMode)) state.settings.guidanceMode = guidanceMode;
    const clientId = params.get('client') ?? 'burgertown-high-st';
    startJob(state, fault, clientId, () => 0.31);

    const requestedVariant = Number(params.get('variant'));
    if (Number.isInteger(requestedVariant) && requestedVariant >= 0 && requestedVariant <= (fault.symptomVariants?.length ?? 0)) {
      state.jobs.active.variant = requestedVariant;
    }

    if (params.has('tested')) {
      state.jobs.active.testsRun.push('temp-probe');
      state.jobs.active.minutesSpent = 5;
    }

    const machines = machineData.machines ?? machineData;
    const clients = clientData.clients ?? clientData;
    document.querySelector('#app').innerHTML = jobView({
      state,
      faults: { [fault.id]: fault },
      machines,
      clients,
      pendingFirstFixId: params.has('confirm') ? state.jobs.active.fixOptions[0] : null,
    });
    wireTermHelp(document.querySelector('#app'));
    document.querySelector('[data-action="go-to-diagnostics"]')?.addEventListener('click', () => {
      document.querySelector('.diagnostics-panel')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    document.body.dataset.viewportWidth = innerWidth;
  </script>
</body>
</html>
